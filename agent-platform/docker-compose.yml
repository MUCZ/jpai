services:
  agent-service:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    depends_on:
      mock-llm:
        condition: service_started
      jaeger:
        condition: service_healthy
    environment:
      - LLM_SERVER_URL=http://mock-llm:8081
      - OTEL_SERVICE_NAME=agent-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces

  mock-llm:
    build: .
    command: uvicorn src.mock_llm_server:app --host 0.0.0.0 --port 8081
    ports:
      - "8081:8081"

  jaeger:
    image: jaegertracing/all-in-one:1.59
    ports:
      - "16686:16686"
      - "4318:4318"
    command:
      - "--collector.otlp.enabled=true"
      - "--collector.otlp.http.host-port=0.0.0.0:4318"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./conf/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_DEFAULT_THEME=light
    volumes:
      - ./conf/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./conf/grafana/provisioning/dashboard:/etc/grafana/provisioning/dashboards
